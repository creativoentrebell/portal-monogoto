<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monogoto — Catálogo de Belleza</title>
<meta name="description" content="Catálogo digital Monogoto: capilar, makeup, skincare y cuidado personal.">
<style>
  /* ============ Fuentes de marca ============ */
  @font-face{font-family:'TRT Mathos';src:url('fonts/TRTMathos-Light.woff2') format('woff2');font-weight:300;font-style:normal;font-display:swap}
  @font-face{font-family:'TRT Mathos';src:url('fonts/TRTMathos-SemiBold.woff2') format('woff2');font-weight:600;font-style:normal;font-display:swap}
  @font-face{font-family:'Sprout Pop';src:url('fonts/SproutPop-Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}

  :root{
    --taupe:#b19b84;      /* beige oscuro — acento principal */
    --beige:#c3ab93;      /* beige medio */
    --arena:#d6c0a8;      /* beige arena */
    --crema:#eadac3;      /* crema */
    --crema-claro:#f4e8d8;/* crema claro */
    --tinta:#6f5c48;      /* marrón para texto */
    --borde:#eeeae4;      /* línea sutil */
    --radius:22px;
    --body:'TRT Mathos','Poppins',system-ui,sans-serif;
    --display:'Sprout Pop','Baloo 2','Nunito',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:var(--body);font-weight:300;background:#fff;color:var(--tinta);min-height:100vh}

  /* ============ Encabezado ============ */
  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(6px);
    padding:16px 20px 10px;border-bottom:1px solid var(--borde)}
  .head-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px;flex:1;min-width:150px}
  .logo img{height:30px;display:block}
  .logo .wordmark{font-family:var(--display);font-size:1.6rem;color:var(--taupe);letter-spacing:.5px;line-height:1}
  .mode-toggle{display:flex;border:1px solid var(--borde);border-radius:999px;overflow:hidden;flex-shrink:0}
  .mode-btn{font-family:var(--body);font-weight:600;font-size:.7rem;letter-spacing:1.2px;text-transform:uppercase;
    background:none;border:none;color:var(--beige);padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:5px;
    white-space:nowrap;transition:background .2s,color .2s}
  .mode-btn svg{width:11px;height:11px;flex-shrink:0}
  .mode-btn:hover{color:var(--taupe)}
  .mode-btn.active{background:var(--taupe);color:#fff}
  .search-wrap{flex:2;min-width:220px;position:relative}
  .search-wrap input{width:100%;border:1px solid var(--borde);border-radius:999px;padding:10px 42px 10px 18px;
    font-family:var(--body);font-weight:300;font-size:1rem;background:#fff;color:var(--tinta);outline:none;transition:border-color .15s}
  .search-wrap input:focus{border-color:var(--beige)}
  .search-wrap input::placeholder{color:#c9c2b8}
  .search-wrap svg{position:absolute;right:15px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--beige)}

  /* ============ Navegación de categorías ============ */
  nav.cats{position:sticky;top:64px;z-index:40;background:rgba(255,255,255,.96);backdrop-filter:blur(6px);
    padding:10px 20px 12px;border-bottom:1px solid var(--borde)}
  .cats-inner{max-width:1180px;margin:0 auto;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
  .cats-inner::-webkit-scrollbar{display:none}
  .cat-btn{font-family:var(--body);font-weight:600;font-size:.82rem;letter-spacing:.4px;white-space:nowrap;
    background:#fff;color:var(--taupe);border:1px solid var(--borde);border-radius:999px;
    padding:9px 18px;cursor:pointer;transition:all .15s}
  .cat-btn:hover{border-color:var(--beige)}
  .cat-btn.active{background:var(--taupe);color:#fff;border-color:var(--taupe)}

  .subs{max-width:1180px;margin:0 auto;display:flex;gap:7px;overflow-x:auto;padding:8px 0 0;scrollbar-width:none}
  .subs::-webkit-scrollbar{display:none}
  .sub-btn{font-family:var(--body);font-weight:600;font-size:.8rem;white-space:nowrap;
    background:#fff;color:var(--beige);border:none;border-radius:999px;padding:7px 14px;cursor:pointer;transition:color .15s}
  .sub-btn:hover{color:var(--taupe)}
  .sub-btn.active{background:var(--crema-claro);color:var(--tinta)}

  /* ============ Zona de productos ============ */
  main{background:#fff;min-height:70vh;padding:30px 20px 70px}
  .main-inner{max-width:1180px;margin:0 auto}
  .section-title{font-family:var(--body);font-weight:600;font-size:1.6rem;letter-spacing:.2px;color:var(--tinta);margin-bottom:4px}
  .section-count{font-size:.9rem;color:var(--beige);margin-bottom:22px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:16px}
  @media(min-width:700px){.grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px}}

  .card{background:#fff;border:1px solid var(--borde);border-radius:var(--radius);overflow:hidden;
    display:flex;flex-direction:column;transition:transform .18s, box-shadow .18s, border-color .18s;position:relative}
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(111,92,72,.08);border-color:var(--arena)}
  .card.agotado .thumb{filter:grayscale(1);opacity:.5}
  .thumb{aspect-ratio:1/1;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid var(--borde)}
  .thumb img{width:100%;height:100%;object-fit:contain}
  .thumb .noimg{font-family:var(--display);font-size:2.6rem;color:var(--crema)}
  .badge{position:absolute;top:10px;left:10px;font-family:var(--body);font-weight:600;font-size:.66rem;letter-spacing:1px;
    padding:6px 11px;border-radius:999px;text-transform:uppercase}
  .badge.promo{background:var(--taupe);color:#fff}
  .badge.out{background:var(--tinta);color:#fff}
  .card-body{padding:14px 16px 17px;display:flex;flex-direction:column;gap:5px;flex:1}
  .card-name{font-size:.97rem;font-weight:600;line-height:1.3;color:var(--tinta)}
  .card-ref{font-size:.74rem;color:#c9c2b8;letter-spacing:.4px}
  .card-price{margin-top:auto;font-family:var(--body);font-weight:600;font-size:1.15rem;color:var(--taupe)}
  .swatches{display:flex;gap:5px;margin-top:4px}
  .swatches img{width:26px;height:26px;border-radius:8px;border:1px solid var(--borde);cursor:pointer;object-fit:cover;background:#fff}

  .empty{padding:60px 20px;text-align:center;font-family:var(--body);font-weight:600;font-size:1rem;color:var(--beige)}

  /* ============ Modal PIN ============ */
  .overlay{position:fixed;inset:0;background:rgba(111,92,72,.28);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:26px;padding:30px 26px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 50px rgba(111,92,72,.15)}
  .modal h2{font-family:var(--body);font-weight:600;font-size:1.2rem;margin-bottom:6px}
  .modal p{font-size:.85rem;margin-bottom:18px;color:var(--beige)}
  .pin-input{width:100%;border:1px solid var(--borde);border-radius:14px;padding:12px;text-align:center;
    font-size:1.3rem;letter-spacing:8px;font-family:var(--body);font-weight:600;background:#fff;color:var(--tinta);outline:none;margin-bottom:10px}
  .pin-input:focus{border-color:var(--beige)}
  .pin-error{font-size:.78rem;color:#a05a4a;min-height:16px;margin-bottom:6px}
  .btn-row{display:flex;gap:8px}
  .btn{flex:1;font-family:var(--body);font-weight:600;letter-spacing:.5px;font-size:.85rem;border:none;border-radius:14px;padding:12px;cursor:pointer}
  .btn.primary{background:var(--taupe);color:#fff}
  .btn.ghost{background:transparent;color:var(--beige)}

  footer{background:#fff;border-top:1px solid var(--borde);text-align:center;padding:26px 20px 42px;font-size:.78rem;color:#c9c2b8}
  footer .fmark{font-family:var(--display);color:var(--taupe);font-size:1rem;display:block;margin-bottom:6px}

  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="head-inner">
    <div class="logo">
      <img src="img/logo.png" alt="monogoto" onerror="this.remove();document.getElementById('wm').style.display='block'">
      <span class="wordmark" id="wm" style="display:none">monogoto</span>
    </div>
    <div class="mode-toggle" role="group" aria-label="Modo de precios">
      <button class="mode-btn" data-mode="catalogo">Catálogo</button>
      <button class="mode-btn" data-mode="detal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg> Detal</button>
      <button class="mode-btn" data-mode="mayorista"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg> Mayorista</button>
    </div>
  </div>
  <div class="head-inner" style="margin-top:10px">
    <div class="search-wrap">
      <input type="search" id="search" placeholder="Buscar producto o referencia…" autocomplete="off">
      <svg fill="none" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    </div>
  </div>
</header>

<nav class="cats">
  <div class="cats-inner" id="catBar"></div>
  <div class="subs" id="subBar"></div>
</nav>

<main>
  <div class="main-inner">
    <h1 class="section-title" id="title">Todos los productos</h1>
    <div class="section-count" id="count"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">No encontramos productos con ese filtro.</div>
  </div>
</main>

<footer>
  <span class="fmark">monogoto</span>
  Cl. 45 #53-10, Medellín · @monogoto_store
</footer>

<!-- Modal de modos / PIN -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div id="stepPin">
      <h2 id="pinTitle">Ingresa el PIN</h2>
      <p id="pinSub"></p>
      <input class="pin-input" id="pin" inputmode="numeric" maxlength="6" autocomplete="off">
      <div class="pin-error" id="pinError"></div>
      <div class="btn-row">
        <button class="btn ghost" id="pinBack">Cancelar</button>
        <button class="btn primary" id="pinOk">Entrar</button>
      </div>
    </div>
  </div>
</div>

<script>
const PIN_DETAL = '121212';
const PIN_MAYORISTA = '000000';
const CATEGORIAS = ['Todos','Línea Capilar','Línea Make Up','Skincare','Cuidado Facial','Cuidado Personal','Importados','DU Belleza'];

let productos = [], mayorista = null;
let modo = localStorage.getItem('mg_modo') || 'catalogo';
let cat = 'Todos', sub = 'Todas', q = '';

const $ = id => document.getElementById(id);
const fmt = n => '$' + Number(n).toLocaleString('es-CO');

/* ---------- carga de datos ---------- */
async function cargar(){
  try{
    const r = await fetch('productos.json');
    productos = (await r.json()).productos;
  }catch(e){
    $('grid').innerHTML = '<div class="empty">No se pudo cargar el catálogo. Intenta recargar la página.</div>';
    return;
  }
  if(modo === 'mayorista') await cargarMayorista();
  pintarCats(); render(); actualizarChip();
}
async function cargarMayorista(){
  if(mayorista) return true;
  try{
    const r = await fetch('precios-mayorista.json');
    mayorista = await r.json();
    return true;
  }catch(e){ mayorista = null; return false; }
}

/* ---------- filtros ---------- */
function visibles(){
  let list = productos;
  if(modo === 'mayorista' && mayorista) list = list.filter(p => mayorista[p.referencia] !== undefined);
  if(cat !== 'Todos') list = list.filter(p => p.categoria === cat);
  if(sub !== 'Todas') list = list.filter(p => p.subcategoria === sub);
  if(q){
    const t = q.toLowerCase();
    list = list.filter(p => p.nombre.toLowerCase().includes(t) || String(p.referencia).toLowerCase().includes(t));
  }
  return list;
}

/* ---------- render ---------- */
function pintarCats(){
  $('catBar').innerHTML = CATEGORIAS.map(c =>
    `<button class="cat-btn ${c===cat?'active':''}" data-c="${c}">${c}</button>`).join('');
  $('catBar').querySelectorAll('button').forEach(b => b.onclick = () => { cat = b.dataset.c; sub='Todas'; pintarCats(); render(); });
  // subcategorías de la categoría activa
  let subs = [];
  if(cat !== 'Todos'){
    subs = [...new Set(productos.filter(p=>p.categoria===cat).map(p=>p.subcategoria))].sort();
  }
  $('subBar').innerHTML = subs.length ? ['Todas',...subs].map(s =>
    `<button class="sub-btn ${s===sub?'active':''}" data-s="${s}">${s}</button>`).join('') : '';
  $('subBar').querySelectorAll('button').forEach(b => b.onclick = () => { sub = b.dataset.s; pintarCats(); render(); });
}

function precioHTML(p){
  if(modo === 'catalogo') return '';
  let valor;
  if(modo === 'mayorista') valor = mayorista ? mayorista[p.referencia] : undefined;
  else valor = p.precio;
  if(valor === undefined || valor === 'pendiente') return '<div class="card-price">Consultar</div>';
  if(valor === 0) return '<div class="card-price">Muestra</div>';
  return `<div class="card-price">${fmt(valor)}</div>`;
}

function render(){
  const list = visibles();
  $('title').textContent = cat === 'Todos' ? 'Todos los productos' : cat;
  $('count').textContent = list.length + (list.length === 1 ? ' producto' : ' productos') +
    (modo === 'mayorista' ? ' · precios mayoristas' : modo === 'detal' ? ' · precios detal' : '');
  $('empty').style.display = list.length ? 'none' : 'block';
  $('grid').innerHTML = list.map(p => {
    const img = p.imagen
      ? `<img src="${p.imagen}" alt="${p.nombre}" loading="lazy" onerror="this.outerHTML='<span class=noimg>m</span>'">`
      : `<span class="noimg">m</span>`;
    const badges = (p.agotado ? '<span class="badge out">Agotado</span>' :
                    p.promocion ? '<span class="badge promo">Promoción</span>' : '');
    const sw = (p.colores && p.colores.length)
      ? `<div class="swatches">${p.colores.map(c=>`<img src="${c}" loading="lazy" onclick="event.stopPropagation();this.closest('.card').querySelector('.thumb img').src='${c}'">`).join('')}</div>` : '';
    return `<article class="card ${p.agotado?'agotado':''}">
      ${badges}
      <div class="thumb">${img}</div>
      <div class="card-body">
        <div class="card-name">${p.nombre}</div>
        <div class="card-ref">REF ${p.referencia}</div>
        ${sw}
        ${precioHTML(p)}
      </div>
    </article>`;
  }).join('');
}

/* ---------- modos y PIN ---------- */
function actualizarChip(){
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === modo));
}
let modoPendiente = null;

document.querySelectorAll('.mode-btn').forEach(b => b.onclick = () => setMode(b.dataset.mode));
function setMode(m){
  if(m === modo) return;
  if(m === 'catalogo'){ aplicarModo('catalogo'); return; }
  modoPendiente = m;
  $('pinTitle').textContent = m === 'detal' ? 'PIN precios detal' : 'PIN precios mayorista';
  $('pinSub').textContent = 'Ingresa el PIN de acceso.';
  $('pin').value = ''; $('pinError').textContent = '';
  $('overlay').classList.add('open');
  setTimeout(()=>$('pin').focus(), 50);
}
$('overlay').onclick = e => { if(e.target === $('overlay')) $('overlay').classList.remove('open'); };
$('pinBack').onclick = () => $('overlay').classList.remove('open');
$('pinOk').onclick = validarPin;
$('pin').addEventListener('keydown', e => { if(e.key === 'Enter') validarPin(); });

async function validarPin(){
  const v = $('pin').value.trim();
  const ok = (modoPendiente === 'detal' && v === PIN_DETAL) ||
             (modoPendiente === 'mayorista' && v === PIN_MAYORISTA);
  if(!ok){ $('pinError').textContent = 'PIN incorrecto. Inténtalo de nuevo.'; $('pin').value=''; $('pin').focus(); return; }
  if(modoPendiente === 'mayorista'){
    const cargado = await cargarMayorista();
    if(!cargado){ $('pinError').textContent = 'No se pudo cargar la lista mayorista.'; return; }
  }
  aplicarModo(modoPendiente);
}
function aplicarModo(m){
  modo = m; localStorage.setItem('mg_modo', m);
  $('overlay').classList.remove('open');
  actualizarChip(); pintarCats(); render();
}

/* ---------- búsqueda ---------- */
let deb;
$('search').addEventListener('input', e => {
  clearTimeout(deb);
  deb = setTimeout(() => { q = e.target.value.trim(); render(); }, 180);
});

/* Si el modo guardado es mayorista, revalidar carga silenciosa; si falla, volver a catálogo */
if(modo === 'mayorista'){ /* se carga en cargar() */ }
cargar();
</script>
</body>
</html>
